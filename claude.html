<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Explorer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    color: #c8d8e8;
    cursor: crosshair;
    user-select: none;
  }

  #canvas { display: block; }

  /* HUD */
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* Top bar */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: linear-gradient(180deg, rgba(0,8,20,0.92) 0%, transparent 100%);
    border-bottom: 1px solid rgba(100,180,255,0.08);
    pointer-events: none;
  }

  #title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(140,200,255,0.75);
    font-family: 'Share Tech Mono', monospace;
  }

  #sim-time {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(100,180,255,0.5);
    letter-spacing: 0.1em;
  }

  /* Planet info panel */
  #info-panel {
    position: fixed;
    top: 72px;
    right: 24px;
    width: 260px;
    background: rgba(2,10,24,0.88);
    border: 1px solid rgba(80,160,255,0.18);
    border-radius: 2px;
    padding: 18px 20px;
    pointer-events: none;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(12px);
  }

  #info-panel.hidden { opacity: 0; }

  #planet-name {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #e8f4ff;
    margin-bottom: 4px;
  }

  #planet-type {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(100,180,255,0.5);
    margin-bottom: 16px;
    font-family: 'Share Tech Mono', monospace;
  }

  .info-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(80,160,255,0.06);
    padding-bottom: 8px;
  }

  .info-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(100,180,255,0.45);
    font-family: 'Share Tech Mono', monospace;
  }

  .info-value {
    font-size: 13px;
    font-weight: 500;
    color: #c0d8f0;
    font-family: 'Share Tech Mono', monospace;
  }

  #planet-desc {
    margin-top: 14px;
    font-size: 12px;
    line-height: 1.65;
    color: rgba(160,200,230,0.6);
    font-weight: 300;
  }

  /* Navigation controls */
  #nav-panel {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    pointer-events: all;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 700px;
    padding: 0 20px;
  }

  .nav-btn {
    background: rgba(4,16,36,0.8);
    border: 1px solid rgba(80,160,255,0.2);
    color: rgba(160,210,255,0.7);
    padding: 7px 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 1px;
  }

  .nav-btn:hover, .nav-btn.active {
    background: rgba(40,100,200,0.25);
    border-color: rgba(80,160,255,0.6);
    color: #a8d4ff;
    box-shadow: 0 0 12px rgba(60,120,255,0.2);
  }

  /* Speed control */
  #speed-panel {
    position: fixed;
    bottom: 30px;
    right: 24px;
    pointer-events: all;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  #speed-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(100,160,255,0.45);
  }

  #speed-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: rgba(120,180,255,0.7);
    margin-top: -4px;
    text-align: right;
  }

  .speed-btn {
    background: rgba(4,16,36,0.8);
    border: 1px solid rgba(80,160,255,0.2);
    color: rgba(160,210,255,0.7);
    width: 32px;
    height: 32px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 1px;
  }

  .speed-btn:hover {
    background: rgba(40,100,200,0.25);
    border-color: rgba(80,160,255,0.5);
    color: #a8d4ff;
  }

  #speed-btns { display: flex; gap: 6px; }

  /* Orbit toggle */
  #controls-panel {
    position: fixed;
    bottom: 30px;
    left: 24px;
    pointer-events: all;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .ctrl-btn {
    background: rgba(4,16,36,0.8);
    border: 1px solid rgba(80,160,255,0.2);
    color: rgba(160,210,255,0.6);
    padding: 7px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 1px;
    text-align: left;
  }

  .ctrl-btn:hover, .ctrl-btn.active {
    background: rgba(40,100,200,0.2);
    border-color: rgba(80,160,255,0.5);
    color: #a8d4ff;
  }

  /* Crosshair cursor glow on hover */
  #hover-label {
    position: fixed;
    pointer-events: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: rgba(160,220,255,0.9);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: rgba(2,10,24,0.7);
    border: 1px solid rgba(80,160,255,0.3);
    padding: 4px 10px;
    border-radius: 1px;
    display: none;
    white-space: nowrap;
    backdrop-filter: blur(4px);
  }

  /* Loading screen */
  #loading {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 1s ease;
  }

  #loading.fade { opacity: 0; pointer-events: none; }

  #loading-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(80,160,255,0.6);
    margin-bottom: 40px;
  }

  #loading-bar-wrap {
    width: 240px;
    height: 1px;
    background: rgba(80,160,255,0.12);
    margin-bottom: 16px;
  }

  #loading-bar {
    height: 100%;
    background: linear-gradient(90deg, rgba(40,100,255,0.6), rgba(120,200,255,0.9));
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px rgba(80,160,255,0.6);

    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(80,120,160,0.6);
    letter-spacing: 0.2em;
  }

  .ring-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(120,180,255,0.4);
  }

    position: fixed;
    top: 72px;
    left: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(80,140,200,0.45);
    letter-spacing: 0.15em;
    line-height: 1.8;
    pointer-events: none;
  }
</style>

  <div id="nav-panel">

    <button class="nav-btn" id="nav-venus" onclick="focusBody('venus')">Venus</button>
    <button class="nav-btn" id="nav-earth" onclick="focusBody('earth')">Earth</button>
    <button class="nav-btn" id="nav-mars" onclick="focusBody('mars')">Mars</button>
    <button class="nav-btn" id="nav-jupiter" onclick="focusBody('jupiter')">Jupiter</button>
    <button class="nav-btn" id="nav-saturn" onclick="focusBody('saturn')">Saturn</button>
    <button class="nav-btn" id="nav-uranus" onclick="focusBody('uranus')">Uranus</button>
    <button class="nav-btn" id="nav-neptune" onclick="focusBody('neptune')">Neptune</button>
    <button class="nav-btn" id="nav-free" onclick="setFreeCamera()">Free Cam</button>
  </div>

  <div id="speed-panel">
    <div id="speed-label">SIM SPEED</div>
    <div id="speed-value">1 day/s</div>
    <div id="speed-btns">
      <button class="speed-btn" onclick="changeSpeed(-1)">−</button>
      <button class="speed-btn" onclick="changeSpeed(1)">+</button>
    </div>
  </div>
</div>

<div id="hover-label"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

    texture: 'uranus',
    hasRings: true, ringsNarrow: true
  },
  neptune: {

    texture: 'neptune'

};

// ─── THREE.JS SETUP ──────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, logarithmicDepthBuffer: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000005, 0.000025);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200000);
camera.position.set(0, 120, 380);
camera.lookAt(0, 0, 0);

// ─── LOADING PROGRESS ──────────────────────────────────────────────────────────

let loadProgress = 0;
const loadingBar = document.getElementById('loading-bar');
const loadingStatus = document.getElementById('loading-status');

function updateLoading(pct, msg) {
  loadProgress = pct;
  loadingBar.style.width = pct + '%';
  loadingStatus.textContent = msg;
}

// ─── TEXTURE GENERATION — HIGH QUALITY ──────────────────────────────────────

function makeCanvas(w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  return [c, c.getContext('2d')];
}

// ── Permutation table for Perlin noise ──
const _perm = new Uint8Array(512);
const _p = new Uint8Array(256);
for (let i=0;i<256;i++) _p[i]=i;
for (let i=255;i>0;i--){const j=Math.floor(Math.random()*(i+1));[_p[i],_p[j]]=[_p[j],_p[i]];}
for (let i=0;i<512;i++) _perm[i]=_p[i&255];

function fade(t){return t*t*t*(t*(t*6-15)+10);}
function lerp(a,b,t){return a+t*(b-a);}
function grad(h,x,y){const u=h<8?x:y,v=h<4?y:h===12||h===14?x:0;return ((h&1)?-u:u)+((h&2)?-v:v);}

function perlin(x,y){
  const X=Math.floor(x)&255, Y=Math.floor(y)&255;
  x-=Math.floor(x); y-=Math.floor(y);
  const u=fade(x),v=fade(y);
  const a=_perm[X]+Y, b=_perm[X+1]+Y;
  return lerp(lerp(grad(_perm[a],x,y),grad(_perm[b],x-1,y),u),
              lerp(grad(_perm[a+1],x,y-1),grad(_perm[b+1],x-1,y-1),u),v);
}

// Fractal Brownian Motion — the real deal
function fbm(x, y, octaves=6, lacunarity=2.0, gain=0.5, freq=1.0) {
  let v=0, amp=1, max=0, f=freq;
  for(let i=0;i<octaves;i++){
    v+=perlin(x*f, y*f)*amp;
    max+=amp; amp*=gain; f*=lacunarity;
  }
  return v/max;
}

// Domain-warped fbm for organic looking noise (Inigo Quilez technique)
function warpedFbm(x, y, octaves=5, freq=1.0) {
  const wx = fbm(x+0.0, y+0.0, octaves, 2.0, 0.5, freq);
  const wy = fbm(x+5.2, y+1.3, octaves, 2.0, 0.5, freq);
  return fbm(x+4.0*wx, y+4.0*wy, octaves, 2.0, 0.5, freq);
}

// Clamp helper
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}
function smoothstep(a,b,t){t=clamp((t-a)/(b-a),0,1);return t*t*(3-2*t);}

// ─────────────────────────────────────────────────────────────────────────────

function generatePlanetTexture(name) {
  const W=2048, H=1024;
  const [c,ctx]=makeCanvas(W,H);
  const img=ctx.createImageData(W,H);
  const px=img.data;

  // ── SUN ──────────────────────────────────────────────────────────────────
  if(name==='sun'){
    for(let j=0;j<H;j++) for(let i=0;i<W;i++){
      const u=i/W, v=j/H;
      const sx=u*8, sy=v*4;
      const n1=fbm(sx,sy,8,2,0.5);
      const n2=fbm(sx+3.1,sy+1.7,6,2.1,0.45);
      const warp=fbm(sx+n1*2,sy+n2*2,5,2,0.5);
      // Granulation pattern
      const gran=fbm(u*60,v*30,4,2,0.4)*0.5+0.5;
      const base=0.5+n1*0.35+warp*0.15;
      const g=clamp(base,0,1);
      // Color: bright yellow-white core → orange rim
      const r=clamp(255,0,255);
      const gv=clamp(Math.floor(200+g*55-gran*15),120,255);
      const b=clamp(Math.floor(gran*40+g*30),0,120);
      const bright=0.7+g*0.3+gran*0.15;
      const idx=(j*W+i)*4;
      px[idx]=clamp(Math.floor(255*bright),180,255);
      px[idx+1]=clamp(Math.floor(gv*bright),100,255);
      px[idx+2]=clamp(Math.floor(b*bright*0.4),0,80);
      px[idx+3]=255;
    }
    ctx.putImageData(img,0,0);
    // Sunspots with penumbra
    for(let k=0;k<14;k++){
      const x=(0.1+Math.random()*0.8)*W, y=(0.2+Math.random()*0.6)*H;
      const r=Math.random()*38+10;
      const g2=ctx.createRadialGradient(x,y,0,x,y,r);
      g2.addColorStop(0,'rgba(20,8,0,0.88)');
      g2.addColorStop(0.35,'rgba(60,20,0,0.65)');
      g2.addColorStop(0.7,'rgba(120,50,0,0.25)');
      g2.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g2; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
    // Solar faculae (bright streaks)
    ctx.globalAlpha=0.08;
    for(let k=0;k<80;k++){
      const x=Math.random()*W,y=Math.random()*H;
      const g3=ctx.createRadialGradient(x,y,0,x,y,Math.random()*25+8);
      g3.addColorStop(0,'rgba(255,255,220,1)');
      g3.addColorStop(1,'rgba(0,0,0,0)');

  // ── MERCURY ───────────────────────────────────────────────────────────────
  if(name==='mercury'){

  // ── VENUS ─────────────────────────────────────────────────────────────────
  if(name==='venus'){

  // ── EARTH ─────────────────────────────────────────────────────────────────
  if(name==='earth'){

    const SEA=0.52;
    for(let j=0;j<H;j++) for(let i=0;i<W;i++){
      const u=i/W, v=j/H;
      const lat=Math.abs(v-0.5)*2;

      const idx=(j*W+i)*4;

        const depth=(SEA-h)/SEA;

          px[idx+2]=clamp(Math.floor(30+moisture*15),15,70);
        } else {

          px[idx+1]=clamp(Math.floor(110+moisture*50+elev*20),80,180);

      const c1=warpedFbm(u*5+1,v*3,6,1.2)*0.5+0.5;

      const clouds=smoothstep(0.56,0.78,c1*0.6+c2*0.4);

  // ── MARS ──────────────────────────────────────────────────────────────────
  if(name==='mars'){

          const jj=flip===1?j:H-j-1;
          if(jj<0||jj>=H)continue;
          const t=j/(capSize+ragged);
          const alpha=clamp(1-t*t*0.7,0,1);
          const idx=(jj*W+i)*4;
          const iceR=230,iceG=238,iceB=255;
          px[idx]=Math.floor(px[idx]*(1-alpha)+iceR*alpha);
          px[idx+1]=Math.floor(px[idx+1]*(1-alpha)+iceG*alpha);

    ctx.strokeStyle='rgba(60,20,8,0.6)'; ctx.lineWidth=20;

    ctx.beginPath(); ctx.moveTo(W*0.33,H*0.48); ctx.bezierCurveTo(W*0.43,H*0.46,W*0.57,H*0.51,W*0.67,H*0.50); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(W*0.33,H*0.5); ctx.bezierCurveTo(W*0.43,H*0.48,W*0.57,H*0.53,W*0.67,H*0.52); ctx.stroke();

    omg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=omg; ctx.beginPath(); ctx.arc(omx,omy,W*0.06,0,Math.PI*2); ctx.fill();
    ctx.restore();
    // Mars craters
    for(const {n,minR,maxR} of [{n:15,minR:20,maxR:50},{n:50,minR:6,maxR:18},{n:150,minR:2,maxR:6}]){
      for(let k=0;k<n;k++){
        const x=Math.random()*W, y=H*0.1+Math.random()*H*0.8;
        const r=minR+Math.random()*(maxR-minR);
        const gs=ctx.createRadialGradient(x,y,0,x,y,r);
        gs.addColorStop(0,'rgba(55,18,8,0.7)');
        gs.addColorStop(0.65,'rgba(80,30,12,0.4)');
        gs.addColorStop(0.9,'rgba(160,80,40,0.3)');
        gs.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=gs; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();

    }
    return new THREE.CanvasTexture(c);
  }

  // ── JUPITER ───────────────────────────────────────────────────────────────
  if(name==='jupiter'){

      const t=(fy2-bandColors[bi].y)/(bandColors[bi+1].y-bandColors[bi].y+0.0001);
      const c1=bandColors[bi].c, c2=bandColors[bi+1].c;
      let r=c1[0]*(1-t)+c2[0]*t;

      const streak=fbm(u*20,fy*4,5,2,0.48)*12;

      const cell=fbm(u*15,fy*25,4,2,0.5)*8;

    gCore.addColorStop(0.6,'rgba(185,55,25,0.65)');

  // ── SATURN ────────────────────────────────────────────────────────────────

  }

  // ── URANUS ────────────────────────────────────────────────────────────────
  if(name==='uranus'){
    for(let j=0;j<H;j++) for(let i=0;i<W;i++){
      const fy=j/H, u=i/W;
      const lat=Math.abs(fy-0.5)*2;
      // Very subtle banding on Uranus
      const bandN=fbm(u*3,fy*5,4,2,0.45)*0.5+0.5;
      const fine=fbm(u*10,fy*8+3,4)*0.05;
      // Limb darkening toward poles
      const limbBright=1-lat*lat*0.3;
      // Methane absorption → teal/cyan
      const methane=0.82+bandN*0.06+fine;
      const r=clamp(Math.floor((55+bandN*25+lat*30)*limbBright),30,120);
      const g=clamp(Math.floor((192+bandN*18+lat*8)*limbBright),150,230);
      const b=clamp(Math.floor((210+bandN*15)*limbBright),170,245);
      const idx=(j*W+i)*4;
      px[idx]=r; px[idx+1]=g; px[idx+2]=b; px[idx+3]=255;
    }
    ctx.putImageData(img,0,0);
    // Subtle cloud features
    ctx.globalAlpha=0.07;
    for(let k=0;k<25;k++){
      const x=Math.random()*W, y=H*0.25+Math.random()*H*0.5;
      const rw=Math.random()*W*0.12+W*0.04, rh=Math.random()*H*0.018+H*0.008;
      const cg=ctx.createRadialGradient(x,y,0,x,y,rw);
      cg.addColorStop(0,'rgba(220,245,255,1)');
      cg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=cg; ctx.beginPath(); ctx.ellipse(x,y,rw,rh,0,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1;
    return new THREE.CanvasTexture(c);
  }

  // ── NEPTUNE ───────────────────────────────────────────────────────────────
  if(name==='neptune'){
    for(let j=0;j<H;j++) for(let i=0;i<W;i++){
      const fy=j/H, u=i/W;
      const lat=Math.abs(fy-0.5)*2;
      // Stronger banding than Uranus, deeper blue
      const n1=warpedFbm(u*4,fy*4,6,1.2)*0.5+0.5;
      const n2=fbm(u*12,fy*6+5,5,2,0.5)*0.3;
      const band=n1*0.65+n2*0.35;
      const r=clamp(Math.floor(15+band*45+lat*20),5,90);
      const g=clamp(Math.floor(35+band*65+lat*25),20,120);
      const b=clamp(Math.floor(160+band*70-lat*20),130,240);
      const idx=(j*W+i)*4;
      px[idx]=r; px[idx+1]=g; px[idx+2]=b; px[idx+3]=255;
    }
    ctx.putImageData(img,0,0);
    // Great Dark Spot (like Jupiter's GRS but dark)
    const gx=W*0.38, gy=H*0.44, grw=W*0.055, grh=H*0.035;
    const gds=ctx.createRadialGradient(gx,gy,0,gx,gy,grw);
    gds.addColorStop(0,'rgba(5,12,55,0.9)');
    gds.addColorStop(0.4,'rgba(10,20,80,0.75)');
    gds.addColorStop(0.75,'rgba(15,30,100,0.45)');
    gds.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gds; ctx.beginPath(); ctx.ellipse(gx,gy,grw,grh,0,0,Math.PI*2); ctx.fill();
    // Companion bright "scooter" cloud
    const sx=W*0.45, sy=H*0.465;
    const scoot=ctx.createRadialGradient(sx,sy,0,sx,sy,W*0.018);
    scoot.addColorStop(0,'rgba(180,215,255,0.75)');
    scoot.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=scoot; ctx.beginPath(); ctx.ellipse(sx,sy,W*0.018,H*0.010,0,0,Math.PI*2); ctx.fill();
    // Bright cloud streaks
    ctx.globalAlpha=0.2;
    for(let k=0;k<18;k++){
      const cy=H*0.15+Math.random()*H*0.7;
      const cg=ctx.createLinearGradient(0,cy-5,W,cy+5);
      cg.addColorStop(0,'rgba(150,200,255,0)');
      cg.addColorStop(0.3+Math.random()*0.2,'rgba(180,220,255,0.6)');
      cg.addColorStop(1,'rgba(150,200,255,0)');
      ctx.fillStyle=cg; ctx.fillRect(0,cy-4,W,8);
    }
    ctx.globalAlpha=1;
    return new THREE.CanvasTexture(c);
  }

  // ── MOON ─────────────────────────────────────────────────────────────────
  if(name==='moon'){
    const MW=1024, MH=512;
    const [mc,mctx]=makeCanvas(MW,MH);
    const mimg=mctx.createImageData(MW,MH);
    const mp=mimg.data;
    for(let j=0;j<MH;j++) for(let i=0;i<MW;i++){
      const u=i/MW*5, v=j/MH*2.5;
      const h=warpedFbm(u,v,7,1.0)*0.5+0.5;
      const fine=fbm(u*8,v*8,4)*0.08;
      const t=clamp(h+fine,0,1);
      // Highland/mare distinction
      const isHighland=t>0.52;
      let lv;
      if(isHighland){
        lv=Math.floor(155+(t-0.52)/0.48*75); // 155–230
      } else {
        lv=Math.floor(80+t/0.52*75); // 80–155
      }
      // Slight brownish tint
      const idx=(j*MW+i)*4;
      mp[idx]=clamp(lv+4,0,255); mp[idx+1]=clamp(lv,0,255); mp[idx+2]=clamp(lv-12,0,255); mp[idx+3]=255;
    }
    mctx.putImageData(mimg,0,0);
    // Large mare basins (dark)
    const mares=[[MW*0.55,MH*0.38,MW*0.12,MH*0.09],[MW*0.45,MH*0.3,MW*0.08,MH*0.06],[MW*0.62,MH*0.52,MW*0.07,MH*0.05],[MW*0.32,MH*0.42,MW*0.06,MH*0.04]];
    for(const [mx,my,mrw,mrh] of mares){
      const mg=mctx.createRadialGradient(mx,my,0,mx,my,Math.max(mrw,mrh));
      mg.addColorStop(0,'rgba(55,50,42,0.72)');
      mg.addColorStop(0.6,'rgba(65,60,50,0.45)');
      mg.addColorStop(1,'rgba(0,0,0,0)');
      mctx.fillStyle=mg; mctx.beginPath(); mctx.ellipse(mx,my,mrw,mrh,0,0,Math.PI*2); mctx.fill();
    }
    // Craters
    for(const {n,minR,maxR} of [{n:8,minR:18,maxR:45},{n:30,minR:6,maxR:18},{n:120,minR:2,maxR:6}]){
      for(let k=0;k<n;k++){
        const x=Math.random()*MW, y=Math.random()*MH;
        const r=minR+Math.random()*(maxR-minR);
        const rim=mctx.createRadialGradient(x,y,r*0.65,x,y,r*1.1);
        rim.addColorStop(0,'rgba(0,0,0,0)');
        rim.addColorStop(0.7,'rgba(210,200,185,0.5)');
        rim.addColorStop(1,'rgba(0,0,0,0)');
        mctx.fillStyle=rim; mctx.beginPath(); mctx.arc(x,y,r*1.1,0,Math.PI*2); mctx.fill();
        const bowl=mctx.createRadialGradient(x,y,0,x,y,r*0.9);
        bowl.addColorStop(0,'rgba(30,28,22,0.8)');
        bowl.addColorStop(0.55,'rgba(45,42,35,0.5)');
        bowl.addColorStop(1,'rgba(0,0,0,0)');
        mctx.fillStyle=bowl; mctx.beginPath(); mctx.arc(x,y,r*0.9,0,Math.PI*2); mctx.fill();
        // Ray system for big craters
        if(r>20){
          mctx.save(); mctx.globalAlpha=0.12;
          for(let ray=0;ray<8;ray++){
            const angle=ray/8*Math.PI*2;
            const len=r*(4+Math.random()*3);
            mctx.strokeStyle='rgba(215,205,190,1)';
            mctx.lineWidth=r*0.2;
            mctx.beginPath(); mctx.moveTo(x,y);
            mctx.lineTo(x+Math.cos(angle)*len, y+Math.sin(angle)*len);
            mctx.stroke();
          }
          mctx.restore();
        }
      }
    }
    return new THREE.CanvasTexture(mc);
  }

  ctx.fillStyle='#888'; ctx.fillRect(0,0,W,H);
  return new THREE.CanvasTexture(c);
}

function generateRingTexture(narrow=false) {
  const W=2048, H=1;
  const [c,ctx]=makeCanvas(W,H);
  const d=ctx.createImageData(W,H);

  if(narrow){
    // Uranus: 9 distinct narrow dark rings with small gaps
    const rings=[
      {from:0.08,to:0.105,opacity:0.6,r:100,g:115,b:130},
      {from:0.12,to:0.14,opacity:0.5,r:95,g:110,b:125},
      {from:0.16,to:0.175,opacity:0.7,r:100,g:118,b:135},
      {from:0.20,to:0.215,opacity:0.55,r:98,g:113,b:130},
      {from:0.24,to:0.27,opacity:0.8,r:108,g:125,b:142},
      {from:0.32,to:0.38,opacity:0.65,r:105,g:120,b:138},
      {from:0.45,to:0.52,opacity:0.75,r:110,g:128,b:145},
      {from:0.60,to:0.66,opacity:0.85,r:115,g:132,b:148},
      {from:0.74,to:0.82,opacity:0.9,r:118,g:135,b:152},
    ];
    for(let i=0;i<W;i++){
      const t=i/W;
      let alpha=0,r=100,g=115,b=130;
      for(const ring of rings){
        if(t>=ring.from&&t<=ring.to){
          const bandT=(t-ring.from)/(ring.to-ring.from);
          const falloff=Math.sin(bandT*Math.PI);
          alpha=ring.opacity*falloff;
          r=ring.r; g=ring.g; b=ring.b;
          // Fine structure noise
          alpha*=(0.7+fbm(i*0.05,0,3)*0.3+0.0001);
          break;
        }
      }
      d.data[i*4]=r; d.data[i*4+1]=g; d.data[i*4+2]=b;
      d.data[i*4+3]=Math.floor(clamp(alpha,0,1)*255);
    }
  } else {
    // Saturn: C, B, Cassini, A, F rings with full detail
    const ringZones=[
      {from:0.00,to:0.06,a:0.0,r:0,g:0,b:0},             // gap
      {from:0.06,to:0.16,a:0.28,r:160,g:148,b:118},       // C ring (crepe)
      {from:0.16,to:0.195,a:0.05,r:140,g:130,b:105},      // Maxwell gap
      {from:0.195,to:0.56,a:0.88,r:210,g:195,b:155},      // B ring (brightest)
      {from:0.56,to:0.60,a:0.02,r:120,g:110,b:85},        // Cassini Division
      {from:0.60,to:0.86,a:0.65,r:200,g:185,b:142},       // A ring
      {from:0.86,to:0.875,a:0.02,r:120,g:110,b:85},       // Encke gap
      {from:0.875,to:0.895,a:0.5,r:195,g:180,b:138},      // outer A ring
      {from:0.895,to:0.93,a:0.1,r:170,g:160,b:125},       // F ring
      {from:0.93,to:1.0,a:0.0,r:0,g:0,b:0},               // gap
    ];
    for(let i=0;i<W;i++){
      const t=i/W;
      let alpha=0,r=200,g=185,b=145;
      for(const z of ringZones){
        if(t>=z.from&&t<z.to){
          alpha=z.a; r=z.r; g=z.g; b=z.b; break;
        }
      }
      if(alpha>0.05){
        // Density waves and fine radial structure
        const wave1=Math.sin(i*0.18)*0.04;
        const wave2=Math.sin(i*0.47+1.3)*0.025;
        const wave3=fbm(i*0.008,0,5)*0.06;
        const noise=wave1+wave2+wave3;
        alpha=clamp(alpha+noise*alpha,0,1);
        // Color variation: inner rings slightly more opaque/blue, outer warmer
        const warmth=t*0.15;
        r=clamp(Math.floor(r+warmth*20+fbm(i*0.02,0,3)*8),0,255);
        g=clamp(Math.floor(g+warmth*15+fbm(i*0.02,1,3)*6),0,255);
        b=clamp(Math.floor(b-warmth*10),0,255);
      }
      d.data[i*4]=r; d.data[i*4+1]=g; d.data[i*4+2]=b;
      d.data[i*4+3]=Math.floor(clamp(alpha,0,1)*255);
    }
  }
  ctx.putImageData(d,0,0);
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=THREE.ClampToEdgeWrapping;
  tex.wrapT=THREE.ClampToEdgeWrapping;
  return tex;
}

function generateStarfield() {
  const W=4096, H=2048;
  const [c,ctx]=makeCanvas(W,H);
  ctx.fillStyle='#00000a'; ctx.fillRect(0,0,W,H);

  // Milky Way — layered nebulosity FIRST (behind stars)
  // Core bulge
  const mwCx=W*0.5, mwCy=H*0.5;
  for(let k=0;k<8;k++){
    const bx=mwCx+(-0.05+Math.random()*0.1)*W;
    const by=mwCy+(-0.04+Math.random()*0.08)*H;
    const br=W*(0.06+Math.random()*0.12);
    const g=ctx.createRadialGradient(bx,by,0,bx,by,br);
    const hue=Math.random()<0.5?'rgba(210,190,230,':'rgba(200,185,220,';
    g.addColorStop(0,`${hue}0.07)`);
    g.addColorStop(0.4,`${hue}0.04)`);
    g.addColorStop(1,`${hue}0)`);
    ctx.fillStyle=g; ctx.fillRect(bx-br,by-br,br*2,br*2);
  }
  // Spiral arm dust lanes
  for(let k=0;k<120;k++){
    const theta=Math.random()*Math.PI*2;
    const r=(0.1+Math.random()*0.45)*W;
    const bandSpread=(Math.random()-0.5)*H*0.18;
    const armX=mwCx+Math.cos(theta)*r;
    const armY=mwCy+Math.sin(theta)*r*0.28+bandSpread;
    const armR=W*(0.015+Math.random()*0.055);
    const ag=ctx.createRadialGradient(armX,armY,0,armX,armY,armR);
    const brightness=0.03+Math.random()*0.06;
    const tint=Math.random();
    const col=tint<0.33?`rgba(200,190,230,${brightness})`
             :tint<0.66?`rgba(220,200,200,${brightness})`
             :`rgba(190,200,240,${brightness})`;
    ag.addColorStop(0,col); ag.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ag; ctx.fillRect(armX-armR,armY-armR,armR*2,armR*2);
  }

  // Stars — spectral class based color & size distribution
  const starTypes=[
    {frac:0.001,size:[3.5,5.0],r:[155,170],g:[165,185],b:[255,255]},  // O — blue
    {frac:0.01, size:[2.5,4.0],r:[170,190],g:[190,210],b:[255,255]},  // B — blue-white
    {frac:0.04, size:[1.5,2.5],r:[220,240],g:[230,248],b:[255,255]},  // A — white
    {frac:0.08, size:[1.2,2.0],r:[248,255],g:[248,255],b:[200,230]},  // F — yellow-white
    {frac:0.15, size:[0.8,1.6],r:[255,255],g:[230,248],b:[140,180]},  // G — yellow (like Sun)
    {frac:0.28, size:[0.6,1.2],r:[255,255],g:[180,210],b:[80,120]},   // K — orange
    {frac:0.42, size:[0.4,0.8],r:[255,200,200],g:[100,140,140],b:[60,80,80]}, // M — red
  ];

  const totalStars=22000;
  for(let i=0;i<totalStars;i++){
    const x=Math.random()*W, y=Math.random()*H;
    // Pick spectral class
    let cum=0, st=starTypes[starTypes.length-1];
    const r=Math.random();
    for(const t of starTypes){ cum+=t.frac; if(r<cum){st=t;break;} }
    const sz=st.size[0]+Math.random()*(st.size[1]-st.size[0]);
    const brightness=0.4+Math.random()*0.6;
    const sr=Array.isArray(st.r[0])?Math.floor(st.r[0]+Math.random()*(st.r[1]-st.r[0])):Math.floor(st.r[0]+Math.random()*(st.r[1]-st.r[0]));
    const sg=Math.floor(st.g[0]+Math.random()*(st.g[1]-st.g[0]));
    const sb=Math.floor(st.b[0]+Math.random()*(st.b[1]-st.b[0]));
    // Twinkle diffraction spikes on bright stars
    if(sz>2.5){
      ctx.save(); ctx.globalAlpha=brightness*0.25;
      ctx.strokeStyle=`rgba(${sr},${sg},${sb},1)`;
      ctx.lineWidth=0.5;
      for(let spike=0;spike<4;spike++){
        const angle=spike*Math.PI/4;
        const len=sz*(6+Math.random()*4);
        ctx.beginPath();
        ctx.moveTo(x-Math.cos(angle)*sz*0.5, y-Math.sin(angle)*sz*0.5);
        ctx.lineTo(x+Math.cos(angle)*len, y+Math.sin(angle)*len);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x+Math.cos(angle)*sz*0.5, y+Math.sin(angle)*sz*0.5);
        ctx.lineTo(x-Math.cos(angle)*len, y-Math.sin(angle)*len);
        ctx.stroke();
      }
      ctx.restore();
    }
    // Glow for bright stars
    if(sz>1.8){
      ctx.globalAlpha=brightness*0.12;
      const gg=ctx.createRadialGradient(x,y,0,x,y,sz*3.5);
      gg.addColorStop(0,`rgba(${sr},${sg},${sb},1)`);
      gg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(x,y,sz*3.5,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=brightness;
    ctx.fillStyle=`rgb(${sr},${sg},${sb})`;
    ctx.beginPath(); ctx.arc(x,y,sz*0.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  return new THREE.CanvasTexture(c);
}

function makeOrbitLine(radius, inclination, eccentricity, color=0x1a3050) {
  const pts = [];
  const N = 256;
  const b = radius * Math.sqrt(1 - eccentricity * eccentricity);
  const c = radius * eccentricity;
  for (let i = 0; i <= N; i++) {
    const angle = (i / N) * Math.PI * 2;
    const x = Math.cos(angle) * radius - c;
    const z = Math.sin(angle) * b;
    pts.push(new THREE.Vector3(x, 0, z));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.35, depthWrite: false });
  const line = new THREE.LineLoop(geo, mat);
  line.rotation.x = inclination * DEG;
  scene.add(line);
  return line;
}

function makeLabel(text, size=12) {
  const [c,ctx] = makeCanvas(256, 48);
  ctx.font = `${size}px 'Share Tech Mono', monospace`;
  ctx.fillStyle = 'rgba(120,180,255,0.85)';
  ctx.textAlign = 'center';
  ctx.fillText(text.toUpperCase(), 128, 32);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(30, 6, 1);
  return sprite;
}

for (const [key, data] of Object.entries(PLANET_DATA)) {
  const orbitLine = makeOrbitLine(data.orbitRadius, data.inclination, data.eccentricity);
  orbitLines.push(orbitLine);

  const geo = new THREE.SphereGeometry(data.radius, 64, 64);
  const tex = generatePlanetTexture(data.texture || key);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  const isGasGiant = key==='jupiter'||key==='saturn'||key==='uranus'||key==='neptune';
  const mat = new THREE.MeshPhongMaterial({
    map: tex,
    emissive: new THREE.Color(data.emissive),
    emissiveIntensity: 0.06,
    shininess: key==='earth'?35 : key==='venus'?20 : isGasGiant?8 : 4,
    specular: new THREE.Color(key==='earth'?0x223344 : key==='venus'?0x221a00 : 0x080808)
  });

  const pivot = new THREE.Object3D();
  pivot.rotation.x = data.inclination * DEG;
  scene.add(pivot);

  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.rotation.z = data.axialTilt * DEG;

  const container = new THREE.Object3D();
  container.add(mesh);
  pivot.add(container);

  // Rings
  if (data.hasRings) {
    const ringTex = generateRingTexture(data.ringsNarrow);
    let innerR = data.radius * 1.35, outerR = data.radius * (data.ringsNarrow ? 1.8 : 2.5);
    if (!data.ringsNarrow) { innerR = data.radius * 1.15; outerR = data.radius * 2.4; }
    const ringGeo = new THREE.RingGeometry(innerR, outerR, 128);
    // UV fix for ring
    const pos = ringGeo.attributes.position;
    const uv = ringGeo.attributes.uv;
    for (let i = 0; i < pos.count; i++) {
      const v = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
      const r = v.length();
      uv.setXY(i, (r - innerR) / (outerR - innerR), 0);
    }
    const ringMat = new THREE.MeshBasicMaterial({
      map: ringTex, side: THREE.DoubleSide, transparent: true,
      depthWrite: false, blending: THREE.NormalBlending
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    if (data.ringsNarrow) ring.rotation.x = Math.PI/2;
    container.add(ring);
  }

  // Earth's Moon
  if (data.hasMoon) {
    const moonTex = generatePlanetTexture('moon');
    const moonGeo = new THREE.SphereGeometry(1.1, 32, 32);
    const moonMat = new THREE.MeshPhongMaterial({ map: moonTex, shininess: 3 });
    const moon = new THREE.Mesh(moonGeo, moonMat);
    moon.castShadow = true;
    const moonPivot = new THREE.Object3D();
    moonPivot.add(moon);
    moon.position.x = data.radius * 2.8;
    container.add(moonPivot);
    container.moonPivot = moonPivot;
  }

  // Atmosphere glow (Earth, Venus)
  if (key === 'earth') {
    const atmoGeo = new THREE.SphereGeometry(data.radius * 1.035, 32, 32);
    const atmoMat = new THREE.MeshPhongMaterial({
      color: 0x4499ff, transparent: true, opacity: 0.12,
      side: THREE.FrontSide, depthWrite: false
    });
    container.add(new THREE.Mesh(atmoGeo, atmoMat));
  }
  if (key === 'venus') {
    const atmoGeo = new THREE.SphereGeometry(data.radius * 1.04, 32, 32);
    const atmoMat = new THREE.MeshPhongMaterial({
      color: 0xffee88, transparent: true, opacity: 0.15,
      side: THREE.FrontSide, depthWrite: false
    });
    container.add(new THREE.Mesh(atmoGeo, atmoMat));
  }

  // Label
  const label = makeLabel(data.name);
  label.position.y = data.radius + 5;
  container.add(label);
  label.visible = false;
  labelSprites.push(label);

  // Position at angle 0
  container.position.set(data.orbitRadius, 0, 0);

  planets[key] = { data, pivot, container, mesh, orbitLine, label, angle: Math.random() * Math.PI * 2 };
}

updateLoading(60,'Generating asteroid belt...');

// Asteroid belt
const asteroidGroup = new THREE.Group();
scene.add(asteroidGroup);

function makeAsteroidBelt() {
  const N = 2800;
  const positions = new Float32Array(N * 3);
  const colors = new Float32Array(N * 3);
  const sizes = new Float32Array(N);
  const innerBelt = 2.1 * AU, outerBelt = 3.3 * AU;

  for (let i = 0; i < N; i++) {
    const r = innerBelt + Math.pow(Math.random(), 0.7) * (outerBelt - innerBelt);
    const angle = Math.random() * Math.PI * 2;
    const tilt = (Math.random() - 0.5) * 22;
    positions[i * 3] = Math.cos(angle) * r;
    positions[i * 3 + 1] = tilt;
    positions[i * 3 + 2] = Math.sin(angle) * r;
    const brightness = 0.3 + Math.random() * 0.4;
    colors[i * 3] = brightness * 1.05;
    colors[i * 3 + 1] = brightness;
    colors[i * 3 + 2] = brightness * 0.9;
    sizes[i] = Math.random() < 0.05 ? 2.5 : Math.random() < 0.2 ? 1.5 : 0.8;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.PointsMaterial({
    vertexColors: true, size: 1.2, sizeAttenuation: true,
    transparent: true, opacity: 0.7, depthWrite: false
  });

  const pts = new THREE.Points(geo, mat);
  asteroidGroup.add(pts);
}

makeAsteroidBelt();

updateLoading(80,'Setting up camera system...');

// ─── CAMERA SYSTEM ──────────────────────────────────────────────────────────

let cameraState = {
  target: 'sun',
  mode: 'orbit',  // 'orbit' | 'free' | 'follow'
  theta: 0.4,
  phi: Math.PI / 4,
  distance: 380,
  targetPos: new THREE.Vector3(),
  currentPos: new THREE.Vector3(0, 120, 380),
  smoothFactor: 0.06
};

let isDragging = false, lastMouse = { x: 0, y: 0 };
let pinchDist = 0;

canvas.addEventListener('mousedown', e => {
  if (e.target !== canvas) return;
  isDragging = true;
  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);

canvas.addEventListener('mousemove', e => {
  if (!isDragging) {
    checkHover(e.clientX, e.clientY);
    return;
  }
  const dx = e.clientX - lastMouse.x;
  const dy = e.clientY - lastMouse.y;
  cameraState.theta -= dx * 0.008;
  cameraState.phi = Math.max(0.05, Math.min(Math.PI * 0.48, cameraState.phi - dy * 0.006));
  lastMouse = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.12 : 0.89;
  cameraState.distance = Math.max(15, Math.min(8000, cameraState.distance * factor));
}, { passive: false });

// Touch support
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true;
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    pinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && isDragging) {
    const dx = e.touches[0].clientX - lastMouse.x;
    const dy = e.touches[0].clientY - lastMouse.y;
    cameraState.theta -= dx * 0.012;
    cameraState.phi = Math.max(0.05, Math.min(Math.PI * 0.48, cameraState.phi - dy * 0.008));
    lastMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  } else if (e.touches.length === 2) {
    const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    cameraState.distance *= pinchDist / d;
    cameraState.distance = Math.max(15, Math.min(8000, cameraState.distance));
    pinchDist = d;
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', () => isDragging = false);

// Click to focus
canvas.addEventListener('click', e => {
  checkClick(e.clientX, e.clientY);
});

// ─── RAYCASTING / HOVER ──────────────────────────────────────────────────────

const raycaster = new THREE.Raycaster();
const mouseVec = new THREE.Vector2();
const hoverLabel = document.getElementById('hover-label');
let hoveredPlanet = null;

function getPickableMeshes() {
  const arr = [sun];
  for (const p of Object.values(planets)) arr.push(p.mesh);
  return arr;
}

function checkHover(x, y) {
  mouseVec.set((x / window.innerWidth) * 2 - 1, -(y / window.innerHeight) * 2 + 1);
  raycaster.setFromCamera(mouseVec, camera);
  const hits = raycaster.intersectObjects(getPickableMeshes());
  if (hits.length > 0) {
    const obj = hits[0].object;
    let name = obj === sun ? 'Sol' : null;
    for (const [k, p] of Object.entries(planets)) if (p.mesh === obj) name = p.data.name;
    if (name) {
      hoverLabel.style.display = 'block';
      hoverLabel.style.left = (x + 14) + 'px';
      hoverLabel.style.top = (y - 10) + 'px';
      hoverLabel.textContent = name;
      document.body.style.cursor = 'pointer';
      return;
    }
  }
  hoverLabel.style.display = 'none';
  document.body.style.cursor = 'crosshair';
}

function checkClick(x, y) {
  mouseVec.set((x / window.innerWidth) * 2 - 1, -(y / window.innerHeight) * 2 + 1);
  raycaster.setFromCamera(mouseVec, camera);
  const hits = raycaster.intersectObjects(getPickableMeshes());
  if (hits.length > 0) {
    const obj = hits[0].object;
    if (obj === sun) { focusBody('sun'); return; }
    for (const [k, p] of Object.entries(planets)) {
      if (p.mesh === obj) { focusBody(k); return; }
    }
  }
}

// ─── FOCUS / NAVIGATION ──────────────────────────────────────────────────────

function focusBody(name) {
  cameraState.target = name;
  cameraState.mode = 'follow';

  // Update nav buttons
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + (name === 'sun' ? 'sol' : name));
  if (btn) btn.classList.add('active');

  if (name === 'sun') {
    cameraState.distance = 160;
    updateInfoPanel(null);
  } else {
    const data = PLANET_DATA[name];
    cameraState.distance = data.radius * 12;
    updateInfoPanel(name);
  }
}

function setFreeCamera() {
  cameraState.mode = 'free';
  cameraState.target = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-free').classList.add('active');
  updateInfoPanel(null);
}

function updateInfoPanel(name) {
  const panel = document.getElementById('info-panel');
  if (!name) {
    panel.classList.add('hidden');
    return;
  }
  const d = PLANET_DATA[name];
  panel.classList.remove('hidden');
  document.getElementById('planet-name').textContent = d.name;
  document.getElementById('planet-type').textContent = d.type;
  document.getElementById('p-dist').textContent = d.distance;
  document.getElementById('p-diam').textContent = d.diameter;
  document.getElementById('p-period').textContent = d.periodStr;
  document.getElementById('p-day').textContent = d.dayStr;
  document.getElementById('p-moons').textContent = d.moons;
  document.getElementById('planet-desc').textContent = d.description;
}

// ─── SIMULATION STATE ──────────────────────────────────────────────────────────

const speeds = [0.1, 0.5, 1, 3, 7, 15, 30, 90, 365];
const speedLabels = ['0.1 day/s', '0.5 day/s', '1 day/s', '3 days/s', '7 days/s', '15 days/s', '1 mo/s', '3 mo/s', '1 yr/s'];
let speedIdx = 2;
let simDay = 0;

function changeSpeed(dir) {
  speedIdx = Math.max(0, Math.min(speeds.length - 1, speedIdx + dir));
  document.getElementById('speed-value').textContent = speedLabels[speedIdx];
}

let showOrbits = true, showLabels = false, showAxes = false, showAsteroids = true;

function toggleOrbits() {
  showOrbits = !showOrbits;
  orbitLines.forEach(l => l.visible = showOrbits);
  document.getElementById('btn-orbits').classList.toggle('active', showOrbits);
}
function toggleLabels() {
  showLabels = !showLabels;
  labelSprites.forEach(l => l.visible = showLabels);
  document.getElementById('btn-labels').classList.toggle('active', showLabels);
}
function toggleAxes() {
  showAxes = !showAxes;
  document.getElementById('btn-axes').classList.toggle('active', showAxes);
}
function toggleAsteroids() {
  showAsteroids = !showAsteroids;
  asteroidGroup.visible = showAsteroids;
  document.getElementById('btn-asteroids').classList.toggle('active', showAsteroids);
}

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────

const clock = new THREE.Clock();
let axisHelpers = {};

function getBodyWorldPos(name) {
  if (name === 'sun') return new THREE.Vector3(0, 0, 0);
  const p = planets[name];
  const v = new THREE.Vector3();
  p.container.getWorldPosition(v);
  return v;
}

updateLoading(95,'Launching simulation...');

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const simDt = dt * speeds[speedIdx];
  simDay += simDt;

  // Update sim time display
  const years = Math.floor(simDay / 365.25);
  const days = Math.floor(simDay % 365.25);
  document.getElementById('sim-time').textContent = `SIM TIME: Y${years.toString().padStart(4,'0')} D${days.toString().padStart(3,'0')}`;

  // Rotate sun
  sun.rotation.y += dt * 0.03;

  // Update planets
  for (const [key, p] of Object.entries(planets)) {
    const { data, pivot, container, mesh } = p;

    // Orbital angle
    const angularVel = (2 * Math.PI) / data.period;
    p.angle += angularVel * simDt;

    // Elliptical position
    const a = data.orbitRadius;
    const e = data.eccentricity;
    const b = a * Math.sqrt(1 - e * e);
    const cx = -a * e;
    container.position.x = Math.cos(p.angle) * a + cx;
    container.position.z = Math.sin(p.angle) * b;

    // Self-rotation
    const rotVel = (2 * Math.PI) / Math.abs(data.rotationPeriod);
    const dir = data.rotationPeriod < 0 ? -1 : 1;
    mesh.rotation.y += rotVel * simDt * dir;

    // Moon orbit
    if (container.moonPivot) {
      container.moonPivot.rotation.y += (2 * Math.PI / 27.3) * simDt;
    }
  }

  // Asteroid belt slow rotation
  asteroidGroup.rotation.y += dt * 0.002;

  // Camera system
  let targetWorldPos;
  if (cameraState.target === 'sun') {
    targetWorldPos = new THREE.Vector3(0, 0, 0);
  } else if (cameraState.target && planets[cameraState.target]) {
    targetWorldPos = getBodyWorldPos(cameraState.target);
  } else {
    targetWorldPos = cameraState.targetPos.clone();
  }

  // Smooth target
  cameraState.targetPos.lerp(targetWorldPos, 0.08);

  // Orbit camera around target
  const camX = cameraState.targetPos.x + cameraState.distance * Math.sin(cameraState.phi) * Math.sin(cameraState.theta);
  const camY = cameraState.targetPos.y + cameraState.distance * Math.cos(cameraState.phi);
  const camZ = cameraState.targetPos.z + cameraState.distance * Math.sin(cameraState.phi) * Math.cos(cameraState.theta);

  camera.position.lerp(new THREE.Vector3(camX, camY, camZ), 0.07);
  camera.lookAt(cameraState.targetPos);

  // Scale sun glows based on camera distance
  const camDist = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
  const glowScale = 1 + Math.max(0, (camDist - 100) * 0.002);
  sunGlows.forEach((g, i) => {
    g.scale.setScalar(glowScale * (1 + i * 0.1));
  });

  renderer.render(scene, camera);
}

// ─── INIT ──────────────────────────────────────────────────────────────────────

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Focus Earth initially
setTimeout(() => {
  updateLoading(100,'Ready.');
  setTimeout(() => {
    document.getElementById('loading').classList.add('fade');
    setTimeout(() => document.getElementById('loading').remove(), 1200);
  }, 400);
  focusBody('earth');
  cameraState.distance = 120;
  cameraState.phi = Math.PI / 5;
}, 200);

animate();
</script>
